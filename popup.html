<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>集盒</title>
  <link rel="stylesheet" href="src/popup/popup.css" />
</head>
<body>
  <main class="popup">
    <header class="tabs" role="tablist">
      <button class="tab is-active" data-tab="translate" role="tab" aria-selected="true">翻译 / 计算</button>
      <button class="tab" data-tab="tools" role="tab" aria-selected="false">更多工具</button>
    </header>

    <!-- Translate + Calculator panel -->
    <section class="panel" data-panel="translate">
      <div class="trans">
        <nav class="trans-links">
          <a href="https://translate.google.com/" target="_blank" rel="noopener">Google</a>
          <a href="https://cn.bing.com/translator" target="_blank" rel="noopener">Bing</a>
          <a href="https://fanyi.youdao.com/" target="_blank" rel="noopener">有道</a>
        </nav>

        <textarea id="trans-input" rows="2" placeholder="输入文本，自动检测语言并翻译" autofocus></textarea>

        <div id="trans-toggle" class="trans-toggle" hidden>
          <span class="lang" data-from></span>
          <button class="swap" type="button" title="交换方向">⇄</button>
          <span class="lang" data-to></span>
        </div>

        <ul id="trans-result" class="trans-result">
          <li class="trans-empty">翻译结果</li>
        </ul>

        <div id="toast" class="toast" hidden></div>
      </div>

      <div class="calc">
        <header class="calc-head">
          <span class="calc-title">计算器</span>
          <button id="calc-clear" type="button" class="link-btn" title="清空历史">清空</button>
        </header>
        <input id="calc-input" type="text" placeholder="例如 (3 + 4) * 2 / 5" autocomplete="off" spellcheck="false" />
        <div id="calc-result" class="calc-result" hidden>
          <span class="lbl">=</span>
          <span class="val"></span>
        </div>
        <ol id="calc-history" class="calc-history"></ol>
      </div>
    </section>

    <!-- Tools panel -->
    <section class="panel" data-panel="tools" hidden>
      <div class="card">
        <h3 class="card-title">功能</h3>
        <div class="grid">
          <button class="feat" data-feat="pinyin">
            <span class="feat-ico">拼</span>
            <span>汉字转拼音</span>
          </button>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">开关</h3>
        <ul class="switches">
          <li><label><span>网页图片匣子</span><input type="checkbox" data-toggle="previewPics" /></label></li>
          <li><label><span>网页自动滚动</span><input type="checkbox" data-toggle="autoScrolling" /></label></li>
          <li><label><span>网页编辑模式</span><input type="checkbox" data-toggle="editMode" /></label></li>
          <li><label><span>定时刷新当前页</span><input type="checkbox" data-toggle="timingReload" /></label></li>
          <li><label><span>网页置灰</span><input type="checkbox" data-toggle="grayscale" /></label></li>
        </ul>
        <p class="tip">下面这些站点级增强默认开启：右键多平台搜索 / 抖音下载 / B 站倍速 / CSDN 解锁 / 网易云下载 / 豆瓣搜片 / 标贝合成 / 古诗文净化 等。</p>
      </div>
    </section>

    <footer class="copyright">集盒 SetBox · @公众号 Slothful</footer>
  </main>

  <!-- Pinyin sheet -->
  <dialog id="pinyin-sheet" class="sheet">
    <header class="sheet-head">
      <strong>汉字转拼音</strong>
      <button type="button" class="sheet-close" data-close>×</button>
    </header>
    <textarea id="pinyin-input" rows="3" placeholder="输入中文汉字"></textarea>
    <ul id="pinyin-result" class="pinyin-result"></ul>
  </dialog>

  <script src="src/popup/popup.js" type="module"></script>
</body>
</html>
